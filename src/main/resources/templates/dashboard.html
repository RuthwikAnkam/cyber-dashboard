<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Cyber Attack Monitoring Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0a0c0f;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .navbar {
            background: #8b0000;
            padding: 15px 20px;
        }
        .navbar-brand {
            font-weight: bold;
            font-size: 1.2rem;
        }
        .stat-card {
            background: #1a1e24;
            border-radius: 8px;
            padding: 20px;
            margin: 10px 0;
        }
        .stat-title {
            font-size: 0.8rem;
            color: #8ba0c0;
            letter-spacing: 1px;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            margin: 5px 0;
        }
        .stat-period {
            font-size: 0.7rem;
            color: #6c8a9e;
        }
        .threat-table {
            background: #1a1e24;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
        }
        .table-custom {
            color: white;
            width: 100%;
        }
        .table-custom th {
            border-bottom: 1px solid #333;
            padding: 12px 8px;
            font-size: 0.8rem;
            color: #8ba0c0;
            font-weight: normal;
        }
        .table-custom td {
            padding: 10px 8px;
            border-bottom: 1px solid #2a2e35;
        }
        .badge-critical {
            background: #dc3545;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
        }
        .badge-high {
            background: #fd7e14;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
        }
        .badge-medium {
            background: #ffc107;
            color: black;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
        }
        .status-blocked {
            background: #198754;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
        }
        .status-investigating {
            background: #fd7e14;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
        }
        .status-detected {
            background: #0d6efd;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
        }
        .logout-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 5px 15px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 0.8rem;
        }
        .logout-btn:hover {
            background: rgba(255,255,255,0.1);
        }
        .text-danger { color: #dc3545 !important; }
        .text-warning { color: #ffc107 !important; }
        .text-success { color: #28a745 !important; }
        .text-info { color: #0dcaf0 !important; }
    </style>
</head>
<body>
<nav class="navbar navbar-dark">
    <div class="container-fluid">
            <span class="navbar-brand">
                <i class="fas fa-shield-alt me-2"></i>
                Cyber Attack Monitoring Dashboard
            </span>
        <div class="d-flex align-items-center">
            <span class="me-3" style="font-size: 0.9rem;">Security Analyst</span>
            <a href="/logout" class="logout-btn">Logout</a>
        </div>
    </div>
</nav>

<div class="container-fluid mt-4 px-4">
    <div class="row">
        <div class="col-md-3">
            <div class="stat-card">
                <div class="stat-title">TOTAL THREATS</div>
                <div class="stat-value text-danger" id="totalThreats">0</div>
                <div class="stat-period">Last 24 hours</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card">
                <div class="stat-title">ACTIVE THREATS</div>
                <div class="stat-value text-warning" id="activeThreats">0</div>
                <div class="stat-period">Needs attention</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card">
                <div class="stat-title">BLOCKED</div>
                <div class="stat-value text-success" id="blockedThreats">0</div>
                <div class="stat-period">Successfully blocked</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card">
                <div class="stat-title">SYSTEMS ONLINE</div>
                <div class="stat-value text-info" id="systemsOnline">12</div>
                <div class="stat-period">All systems operational</div>
            </div>
        </div>
    </div>

    <div class="threat-table">
        <h5 style="margin-bottom: 15px; font-size: 1rem;">Recent Threats</h5>
        <div class="table-responsive">
            <table class="table-custom">
                <thead>
                <tr>
                    <th>TIME</th>
                    <th>TYPE</th>
                    <th>SOURCE IP</th>
                    <th>TARGET</th>
                    <th>SEVERITY</th>
                    <th>STATUS</th>
                </tr>
                </thead>
                <tbody id="threatsBody">
                <tr><td colspan="6" style="text-align: center;">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    async function loadData() {
        try {
            const res = await fetch('/api/threats');
            const data = await res.json();

            document.getElementById('totalThreats').innerText = data.length;
            document.getElementById('activeThreats').innerText = data.filter(t => t.status !== 'Blocked').length;
            document.getElementById('blockedThreats').innerText = data.filter(t => t.status === 'Blocked').length;

            const tbody = document.getElementById('threatsBody');
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">No threats</td></tr>';
            } else {
                tbody.innerHTML = data.map(t => `
                    <tr>
                        <td>${new Date(t.timestamp).toLocaleTimeString()}</td>
                        <td>${t.type}${t.type === 'Brute Force' ? ' Attack' : ''}</td>
                        <td>${t.sourceIp}</td>
                        <td>${t.targetSystem || 'Unknown'}</td>
                        <td><span class="badge-${t.severity === 'Critical' ? 'critical' : t.severity === 'High' ? 'high' : 'medium'}">${t.severity}</span></td>
                        <td><span class="status-${t.status === 'Blocked' ? 'blocked' : t.status === 'Investigating' ? 'investigating' : 'detected'}">${t.status}</span></td>
                    </tr>
                `).join('');
            }
        } catch(e) {
            document.getElementById('threatsBody').innerHTML = '<tr><td colspan="6" style="text-align: center; color: red;">Error loading</td></tr>';
        }
    }
    loadData();
    setInterval(loadData, 10000);
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
</body>
</html>
