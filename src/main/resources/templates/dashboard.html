<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">
<nav class="navbar bg-danger">
    <div class="container">
        <span>🛡️ Cyber Attack Monitor</span>
        <a href="/logout" class="btn btn-light btn-sm">Logout</a>
    </div>
</nav>

<div class="container mt-4">
    <div class="row">
        <div class="col-md-3">
            <div class="card bg-secondary p-3">
                <h6>Total Threats</h6>
                <h2 id="total">0</h2>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card bg-warning p-3">
                <h6>Active Threats</h6>
                <h2 id="active">0</h2>
            </div>
        </div>
    </div>

    <table class="table table-dark mt-4">
        <thead>
        <tr><th>Type</th><th>Severity</th><th>Source IP</th><th>Status</th></tr>
        </thead>
        <tbody id="tableBody">
        <tr><td colspan="4">Loading...</td></tr>
        </tbody>
    </table>
</div>

<script>
    fetch('/api/threats')
        .then(res => res.json())
        .then(data => {
            document.getElementById('total').innerText = data.length;
            document.getElementById('active').innerText = data.filter(t => t.status !== 'Blocked').length;
            document.getElementById('tableBody').innerHTML = data.map(t => `
                <tr>
                    <td>${t.type}</td>
                    <td>${t.severity}</td>
                    <td>${t.sourceIp}</td>
                    <td>${t.status}</td>
                </tr>
            `).join('');
        });
</script>
</body>
</html>
