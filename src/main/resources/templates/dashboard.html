<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Cyber Attack Monitor - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #0a0c0f;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .navbar {
            background: linear-gradient(45deg, #6b0000, #8b1a1a);
            padding: 1rem;
        }
        .navbar-brand {
            font-weight: bold;
            font-size: 1.3rem;
        }
        .stat-card {
            background: #1a1e24;
            border-radius: 12px;
            padding: 20px;
            margin: 10px 0;
            border-left: 4px solid;
            transition: transform 0.2s;
        }
        .stat-card:hover {
            transform: translateY(-3px);
        }
        .stat-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8ba0c0;
            margin-bottom: 8px;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .stat-period {
            font-size: 0.7rem;
            color: #6c8a9e;
        }
        .threat-table {
            background: #1a1e24;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
        }
        .table-custom {
            color: #e0e0e0;
            margin-bottom: 0;
        }
        .table-custom thead th {
            border-bottom: 1px solid #333;
            color: #8ba0c0;
            font-weight: 500;
            font-size: 0.8rem;
            padding: 12px 8px;
        }
        .table-custom tbody td {
            border-bottom: 1px solid #2a2e35;
            padding: 10px 8px;
            vertical-align: middle;
        }
        .badge-critical {
            background: #dc3545;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 500;
        }
        .badge-high {
            background: #fd7e14;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 500;
        }
        .badge-medium {
            background: #ffc107;
            color: #000;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 500;
        }
        .badge-low {
            background: #0dcaf0;
            color: #000;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 500;
        }
        .status-blocked {
            background: #198754;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
        }
        .status-investigating {
            background: #fd7e14;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
        }
        .status-detected {
            background: #0d6efd;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
        }
        .logout-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            border-radius: 6px;
            padding: 5px 15px;
            font-size: 0.8rem;
        }
        .logout-btn:hover {
            background: rgba(255,255,255,0.1);
        }
        .alert-success {
            background: #198754;
            border: none;
            color: white;
            border-radius: 10px;
            font-size: 0.85rem;
        }
        .text-danger-custom {
            color: #dc3545;
        }
        .text-warning-custom {
            color: #ffc107;
        }
        .text-success-custom {
            color: #28a745;
        }
        .text-info-custom {
            color: #0dcaf0;
        }
        .section-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
<!-- Navigation -->
<nav class="navbar navbar-dark">
    <div class="container-fluid">
            <span class="navbar-brand">
                <i class="fas fa-shield-alt me-2"></i>
                Cyber Attack Monitoring Dashboard
            </span>
        <div class="d-flex align-items-center">
            <i class="fas fa-user-circle me-2"></i>
            <span class="me-3" style="font-size: 0.9rem;">Security Analyst</span>
            <a href="/logout" class="btn logout-btn">
                <i class="fas fa-sign-out-alt me-1"></i> Logout
            </a>
        </div>
    </div>
</nav>

<!-- Main Content -->
<div class="container-fluid mt-4 px-4">
    <!-- Stats Cards -->
    <div class="row">
        <div class="col-md-3">
            <div class="stat-card" style="border-left-color: #dc3545;">
                <div class="stat-title">
                    <i class="fas fa-exclamation-triangle me-1"></i> TOTAL THREATS
                </div>
                <div class="stat-value text-danger" id="totalThreats">0</div>
                <div class="stat-period">Last 24 hours</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card" style="border-left-color: #ffc107;">
                <div class="stat-title">
                    <i class="fas fa-bolt me-1"></i> ACTIVE THREATS
                </div>
                <div class="stat-value text-warning" id="activeThreats">0</div>
                <div class="stat-period">Needs attention</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card" style="border-left-color: #28a745;">
                <div class="stat-title">
                    <i class="fas fa-shield-halved me-1"></i> BLOCKED
                </div>
                <div class="stat-value text-success" id="blockedThreats">0</div>
                <div class="stat-period">Successfully blocked</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card" style="border-left-color: #0dcaf0;">
                <div class="stat-title">
                    <i class="fas fa-server me-1"></i> SYSTEMS ONLINE
                </div>
                <div class="stat-value text-info" id="systemsOnline">12</div>
                <div class="stat-period">All systems operational</div>
            </div>
        </div>
    </div>

    <!-- Recent Threats Table -->
    <div class="threat-table">
        <div class="section-title">
            <i class="fas fa-list me-2 text-danger"></i>
            Recent Threats
        </div>
        <div class="table-responsive">
            <table class="table table-custom">
                <thead>
                <tr>
                    <th>TIME</th>
                    <th>TYPE</th>
                    <th>SOURCE IP</th>
                    <th>TARGET</th>
                    <th>SEVERITY</th>
                    <th>STATUS</th>
                </tr>
                </thead>
                <tbody id="threatsTableBody">
                <tr>
                    <td colspan="6" class="text-center text-secondary">
                        <i class="fas fa-spinner fa-spin me-2"></i>Loading threats...
                    </td
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    async function loadDashboard() {
        try {
            const response = await fetch('/api/threats');
            const threats = await response.json();

            const total = threats.length;
            const active = threats.filter(t => t.status === 'Detected' || t.status === 'Investigating').length;
            const blocked = threats.filter(t => t.status === 'Blocked').length;

            document.getElementById('totalThreats').innerText = total;
            document.getElementById('activeThreats').innerText = active;
            document.getElementById('blockedThreats').innerText = blocked;

            const tableBody = document.getElementById('threatsTableBody');
            if (threats.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="6" class="text-center text-secondary">No threats detected</td></tr>';
            } else {
                tableBody.innerHTML = threats.map(threat => {
                    let severityClass = '';
                    if (threat.severity === 'Critical') severityClass = 'badge-critical';
                    else if (threat.severity === 'High') severityClass = 'badge-high';
                    else if (threat.severity === 'Medium') severityClass = 'badge-medium';
                    else severityClass = 'badge-low';

                    let statusClass = '';
                    if (threat.status === 'Blocked') statusClass = 'status-blocked';
                    else if (threat.status === 'Investigating') statusClass = 'status-investigating';
                    else statusClass = 'status-detected';

                    return `
                        <tr>
                            <td style="color: #8ba0c0;">${new Date(threat.timestamp).toLocaleTimeString()}</td>
                            <td>${threat.type}${threat.type === 'Brute Force' ? ' Attack' : ''}</td>
                            <td><code style="color: #e0e0e0; background: transparent;">${threat.sourceIp}</code></td>
                            <td>${threat.targetSystem || 'Unknown'}</td>
                            <td><span class="${severityClass}">${threat.severity}</span></td>
                            <td><span class="${statusClass}">${threat.status}</span></td>
                        </tr>
                    `;
                }).join('');
            }
        } catch (error) {
            document.getElementById('threatsTableBody').innerHTML = '<tr><td colspan="6" class="text-center text-danger">Error loading data</td></tr>';
        }
    }

    loadDashboard();
    setInterval(loadDashboard, 10000);
</script>
</body>
</html>
