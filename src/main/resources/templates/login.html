<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Cyber Attack Monitor - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0a0c0f 0%, #1a1e24 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-container {
            max-width: 450px;
            width: 100%;
            padding: 20px;
        }
        .login-card {
            background: #1a1e24;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        .login-header {
            background: linear-gradient(45deg, #6b0000, #8b1a1a);
            padding: 25px;
            text-align: center;
        }
        .login-header h2 {
            color: white;
            margin: 0;
            font-weight: 600;
            font-size: 1.5rem;
        }
        .login-header p {
            color: rgba(255,255,255,0.8);
            margin: 8px 0 0;
            font-size: 13px;
        }
        .login-body {
            padding: 30px;
        }
        .form-control {
            background: #0a0c0f;
            border: 1px solid #333;
            color: white;
            height: 45px;
            border-radius: 8px;
        }
        .form-control:focus {
            background: #0a0c0f;
            border-color: #8b1a1a;
            color: white;
            box-shadow: none;
        }
        .btn-login {
            background: linear-gradient(45deg, #6b0000, #8b1a1a);
            border: none;
            height: 45px;
            font-weight: 600;
            width: 100%;
            border-radius: 8px;
            color: white;
        }
        .btn-login:hover {
            background: linear-gradient(45deg, #7a0000, #9b2a2a);
        }
        .credentials-box {
            background: #0a0c0f;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            border: 1px solid #333;
        }
        .credentials-box p {
            margin-bottom: 5px;
            font-size: 12px;
            color: #aaa;
        }
        .credentials-box code {
            background: #1a1e24;
            color: #dc3545;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
        }
        .credentials-box .badge-admin {
            background: #dc3545;
            font-size: 10px;
            padding: 3px 8px;
        }
        .credentials-box .badge-analyst {
            background: #0dcaf0;
            color: #000;
            font-size: 10px;
            padding: 3px 8px;
        }
        .alert {
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <h2><i class="fas fa-shield-alt me-2"></i>Cyber Attack Monitor</h2>
            <p>Please sign in to access the dashboard</p>
        </div>
        <div class="login-body">
            <div th:if="${param.error}" class="alert alert-danger">
                <i class="fas fa-exclamation-circle me-2"></i>Invalid username or password
            </div>
            <div th:if="${param.logout}" class="alert alert-success">
                <i class="fas fa-check-circle me-2"></i>You have been logged out
            </div>

            <form method="post" action="/login">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="admin" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt me-2"></i>Sign In
                </button>
            </form>

            <div class="credentials-box">
                <p><strong><i class="fas fa-key me-1"></i>Test Credentials:</strong></p>
                <p><span class="badge-admin me-2">Admin</span> Username: <code>admin</code> | Password: <code>admin123</code></p>
                <p><span class="badge-analyst me-2">Analyst</span> Username: <code>analyst</code> | Password: <code>analyst123</code></p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
