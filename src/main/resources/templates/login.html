<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Login - Cyber Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header h2 {
            color: #333;
            font-size: 24px;
            font-weight: 600;
        }
        .login-header p {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }
        .form-control {
            height: 45px;
            border-radius: 8px;
            border: 1px solid #ddd;
            padding: 10px 15px;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102,126,234,0.25);
        }
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            height: 45px;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            width: 100%;
            margin-top: 20px;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .alert {
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .credentials-box {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            border: 1px solid #dee2e6;
        }
        .credentials-box p {
            margin-bottom: 5px;
            color: #495057;
            font-size: 13px;
        }
        .credentials-box .badge {
            background: #28a745;
            color: white;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
        }
        .credentials-box code {
            background: #e9ecef;
            padding: 2px 5px;
            border-radius: 4px;
            font-size: 12px;
        }
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-header">
        <h2>🛡️ Cyber Attack Monitor</h2>
        <p>Please sign in to access the dashboard</p>
    </div>

    <div th:if="${param.error}" class="alert alert-danger">
        Invalid username or password
    </div>
    <div th:if="${param.logout}" class="alert alert-success">
        You have been logged out
    </div>

    <form method="post" action="/login">
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" placeholder="Enter username" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn-login">Sign In</button>
    </form>

    <div class="credentials-box">
        <p><strong>Test Credentials:</strong></p>
        <p><span class="badge">Admin</span> Username: <code>admin</code> | Password: <code>admin123</code></p>
        <p><span class="badge">Analyst</span> Username: <code>analyst</code> | Password: <code>analyst123</code></p>
    </div>
</div>
</body>
</html>
