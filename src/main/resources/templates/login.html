<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Cyber Attack Monitor - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0a0c0f, #1a1e24);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            background: #1a1e24;
            border-radius: 12px;
            width: 400px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .login-header {
            background: #8b0000;
            padding: 25px;
            text-align: center;
        }
        .login-header h2 {
            color: white;
            margin: 0;
            font-size: 1.4rem;
        }
        .login-header p {
            color: rgba(255,255,255,0.7);
            margin: 8px 0 0;
            font-size: 0.8rem;
        }
        .login-body {
            padding: 30px;
        }
        .form-control {
            background: #0a0c0f;
            border: 1px solid #333;
            color: white;
            height: 42px;
            border-radius: 6px;
        }
        .form-control:focus {
            border-color: #8b0000;
            outline: none;
        }
        .btn-login {
            background: #8b0000;
            border: none;
            height: 42px;
            width: 100%;
            border-radius: 6px;
            color: white;
            font-weight: bold;
        }
        .btn-login:hover {
            background: #a00000;
        }
        .credentials-box {
            background: #0a0c0f;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            border: 1px solid #333;
        }
        .credentials-box p {
            margin: 5px 0;
            font-size: 0.75rem;
            color: #aaa;
        }
        .credentials-box code {
            background: #1a1e24;
            color: #dc3545;
            padding: 2px 5px;
            border-radius: 4px;
        }
        .badge-admin {
            background: #dc3545;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
        }
        .badge-analyst {
            background: #0dcaf0;
            color: black;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
        }
        .alert {
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-header">
        <h2>🛡️ Cyber Attack Monitor</h2>
        <p>Please sign in to access the dashboard</p>
    </div>
    <div class="login-body">
        <div th:if="${param.error}" class="alert alert-danger">Invalid username or password</div>
        <div th:if="${param.logout}" class="alert alert-success">Logged out successfully</div>

        <form method="post" action="/login">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="admin">
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter password">
            </div>
            <button type="submit" class="btn-login">Sign In</button>
        </form>

        <div class="credentials-box">
            <p><strong>Test Credentials:</strong></p>
            <p><span class="badge-admin me-2">Admin</span> Username: <code>admin</code> | Password: <code>admin123</code></p>
            <p><span class="badge-analyst me-2">Analyst</span> Username: <code>analyst</code> | Password: <code>analyst123</code></p>
        </div>
    </div>
</div>
</body>
</html>
