<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - Cyber Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header h2 {
            color: #333;
            font-weight: 600;
        }
        .login-header p {
            color: #666;
            font-size: 14px;
        }
        .form-control {
            height: 45px;
            border-radius: 8px;
            border: 1px solid #ddd;
            padding: 10px 15px;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102,126,234,0.25);
        }
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            height: 45px;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            width: 100%;
            margin-top: 20px;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .alert {
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .credentials-box {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            border: 1px solid #dee2e6;
        }
        .credentials-box p {
            margin-bottom: 5px;
            color: #495057;
            font-size: 13px;
        }
        .credentials-box .badge {
            background: #28a745;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
        }
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-header">
        <h2>🛡️ Cyber Attack Monitor</h2>
        <p>Please sign in to access the dashboard</p>
    </div>

    <!-- Error message -->
    <div th:if="${param.error}" class="alert alert-danger">
        <i class="fas fa-exclamation-circle"></i>
        Invalid username or password
    </div>

    <!-- Logout message -->
    <div th:if="${param.logout}" class="alert alert-success">
        <i class="fas fa-check-circle"></i>
        You have been logged out
    </div>

    <!-- Login Form -->
    <form method="post" th:action="@{/login}">
        <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" id="username" name="username" class="form-control"
                   placeholder="Enter username" required autofocus>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" name="password" class="form-control"
                   placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn-login">
            <i class="fas fa-sign-in-alt"></i> Sign In
        </button>
    </form>

    <!-- Test Credentials -->
    <div class="credentials-box">
        <p><strong>Test Credentials:</strong></p>
        <p><span class="badge">Admin</span> Username: <code>admin</code> | Password: <code>admin123</code></p>
        <p><span class="badge">Analyst</span> Username: <code>analyst</code> | Password: <code>analyst123</code></p>
    </div>
</div>

<!-- Font Awesome for icons -->
<script src="https://kit.fontawesome.com/your-code.js" crossorigin="anonymous"></script>
<!-- If Font Awesome doesn't load, use this alternative -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</body>
</html>
